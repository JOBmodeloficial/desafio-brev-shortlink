name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: Server (lint · build · tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: brevly
          POSTGRES_PASSWORD: brevly
          POSTGRES_DB: brevly
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U brevly"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://brevly:brevly@localhost:5432/brevly
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm run db:migrate
      - run: npm run test:coverage

  web:
    name: Web (lint · build · tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm run test:coverage

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [server, web]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: brevly
          POSTGRES_PASSWORD: brevly
          POSTGRES_DB: brevly
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U brevly"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: 'true'
      DATABASE_URL: postgresql://brevly:brevly@localhost:5432/brevly
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: |
          npm --prefix server ci
          npm --prefix web ci
          npm --prefix e2e ci

      - name: Apply migrations
        run: npm --prefix server run db:migrate

      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Configure web env
        run: printf 'VITE_FRONTEND_URL=http://localhost:5173\nVITE_BACKEND_URL=http://localhost:3333\n' > web/.env

      - name: Run E2E
        run: npm --prefix e2e run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
          if-no-files-found: ignore
