<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brev.ly — Link não encontrado</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="mock-note">
    Mockup — Página 404 <code>*</code>. Exibida quando a rota não existe ou a URL encurtada não é encontrada. Detalhes em <code>SECOES.md</code>.
  </div>

  <main class="center-wrap">
    <!-- SEÇÃO 1 — Card de recurso não encontrado -->
    <section class="center-card">
      <!-- Sub-seção 1.0 — Logo -->
      <img class="logo-img" src="../assets/brev.ly-logo.png" alt="brev.ly" />

      <!-- Sub-seção 1.1 — Ilustração 404 -->
      <div class="illustration">
        <svg width="120" height="90" viewBox="0 0 120 90" fill="none">
          <text x="60" y="60" text-anchor="middle" font-family="Open Sans" font-size="56" font-weight="700" fill="#bd93f9">404</text>
        </svg>
      </div>

      <!-- Sub-seção 1.2 — Título -->
      <h1>Link não encontrado</h1>

      <!-- Sub-seção 1.3 — Mensagem + CTA de volta -->
      <p>
        O link que você está tentando acessar não existe, foi removido ou é uma URL inválida.
        Saiba mais em
        <a class="link-blue" href="#">brev.ly</a>.
      </p>
    </section>
  </main>
</body>
</html>
